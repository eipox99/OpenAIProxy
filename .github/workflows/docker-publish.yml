name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "run.sh"
      - ".env.example"
      - ".gitignore"
      - ".dockerignore"
      - ".github/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase repo name
        run: echo "IMAGE_TAG=ghcr.io/${{ github.repository_owner }}/openaiproxy:latest" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_TAG }}
