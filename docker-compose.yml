services:
  openaiproxy:
    image: ghcr.io/eipox99/openaiproxy:latest
    container_name: openaiproxy
    ports:
      - "8000:8000"
    volumes:
      - /mnt/user/appdata/OpenAIProxy/data:/app/data
      - /mnt/user/appdata/OpenAIProxy/.env:/app/.env:ro
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - AUTH_TOKEN=${AUTH_TOKEN}
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped
