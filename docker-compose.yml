services:
  openaiproxy:
    build: .
    container_name: openaiproxy
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - AUTH_TOKEN=${AUTH_TOKEN}
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped
