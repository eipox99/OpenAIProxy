services:
  openaiproxy:
    image: ghcr.io/eipox99/openaiproxy:latest
    container_name: openaiproxy
    ports:
      - "8000:8000"
    volumes:
      - /mnt/user/appdata/OpenAIProxy/data:/app/data
    environment:
      - ENCRYPTION_KEY=changeme
      - AUTH_TOKEN=changeme
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped
