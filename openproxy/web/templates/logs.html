{% extends "base.html" %}
{% block title %}Activity{% endblock %}
{% block nav_logs %}active{% endblock %}

{% block content %}
<h1>📋 Activity</h1>

<div x-data="dashboardData()" x-init="init()">
    <!-- Stats cards -->
    <template x-if="!statsLoading && stats">
        <div class="stats-grid" style="margin-bottom:2rem;">
            <div class="stat-card" @click="setLogFilter(null)" :class="logFilter === null ? 'active-filter' : ''">
                <div class="num" x-text="stats.total_requests">0</div>
                <div class="label">Total Requests</div>
            </div>
            <div class="stat-card">
                <div class="num" x-text="stats.by_provider.length">0</div>
                <div class="label">Active Providers</div>
            </div>
            <div class="stat-card" @click="setLogFilter('failover')" :class="logFilter === 'failover' ? 'active-filter' : ''">
                <div class="num" x-text="stats.recent_errors.length" style="color:#ff5050;">0</div>
                <div class="label">Errors / Failovers</div>
            </div>
        </div>
    </template>

    <!-- Activity log -->
    <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;">
        <h2 style="margin:0;font-size:1.1rem;">Live Activity</h2>
        <template x-if="logFilter">
            <span class="badge badge-auto" style="font-size:0.7rem;cursor:pointer;" @click="setLogFilter(null)">✕ errors only</span>
        </template>
    </div>

    <template x-if="logLoading">
        <article aria-busy="true">Loading activity...</article>
    </template>
    <template x-if="!logLoading">
        <div style="overflow-x:auto;">
            <table style="font-size:0.8rem;width:100%;">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Chain</th>
                        <th>Status</th>
                        <th>Latency</th>
                        <th>Tokens</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="group in grouped" :key="group[0]?.id || ''">
                        <template x-for="(log, idx) in group" :key="log.id">
                            <tr :class="log.status === 'error' || log.status === 'failover' ? 'error-row' : ''">
                                <td style="white-space:nowrap;" x-text="formatTime(log.timestamp)"></td>
                                <td>
                                    <div style="display:flex;align-items:center;gap:0.4rem;">
                                        <template x-if="idx === 0">
                                            <span style="color:#888;font-size:0.7rem;">▶</span>
                                        </template>
                                        <template x-if="idx > 0">
                                            <span style="color:#f5a623;font-size:0.7rem;">↳</span>
                                        </template>
                                        <span>
                                            <span x-text="log.provider_name"></span>
                                            <code style="font-size:0.75rem;margin-left:0.3rem;" x-text="log.model"></code>
                                        </span>
                                    </div>
                                </td>
                                <td>
                                    <span :style="statusStyle(log.status)" x-text="log.status"></span>
                                    <template x-if="log.error_type">
                                        <small style="color:#888;font-size:0.7rem;" x-text="'(' + log.error_type + ')'"></small>
                                    </template>
                                </td>
                                <td x-text="log.latency_ms != null ? log.latency_ms + 'ms' : '—'"></td>
                                <td x-text="formatTokens(log)"></td>
                            </tr>
                        </template>
                        <tr style="height:4px;"><td colspan="5"></td></tr>
                    </template>
                </tbody>
            </table>
            <template x-if="grouped.length === 0">
                <p class="text-muted" style="padding:1rem;text-align:center;">No activity yet. Make a request to see it here.</p>
            </template>
        </div>
    </template>
</div>
{% endblock %}
